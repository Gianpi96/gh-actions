name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COVERAGE_THRESHOLD: 70

jobs:
  # ─── Matrix test job ──────────────────────────────────────────────────────
  test:
    name: "Test · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov coverage[toml]

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:1234@localhost:5432/testdb
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:1234@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENTRY_DSN: ""
          ENVIRONMENT: test
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Upload to Codecov
        if: matrix.python-version == '3.13' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── Badge update (only on push to main) ────────────────────────────────
  update-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.13

      - name: Compute coverage percentage and color
        id: cov
        run: |
          PCT=$(python3 -c "
          import xml.etree.ElementTree as ET
          rate = float(ET.parse('coverage.xml').getroot().attrib['line-rate'])
          print(round(rate * 100))
          ")
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          if   [ "$PCT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 80 ]; then COLOR=green
          elif [ "$PCT" -ge 70 ]; then COLOR=yellow
          else COLOR=red
          fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Patch badge in README
        env:
          PCT: ${{ steps.cov.outputs.pct }}
          COLOR: ${{ steps.cov.outputs.color }}
        run: |
          sed -i \
            "s|coverage-[0-9]*%25-[a-z]*|coverage-${PCT}%25-${COLOR}|g" \
            README.md

      - name: Commit badge update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update coverage badge → ${{ steps.cov.outputs.pct }}%"
          file_pattern: README.md
